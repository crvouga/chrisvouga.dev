name: Build and push images to Amazon ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ecr-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: portfolio
            checkout_repo: ""
            checkout_path: "."
            build_context: "."
            dockerfile: "./Dockerfile"
            ecr_repository: portfolio
          - id: pickflix
            checkout_repo: crvouga/pickflix-v1
            checkout_path: projects/pickflix-v1
            build_context: projects/pickflix-v1
            dockerfile: projects/pickflix-v1/Dockerfile
            ecr_repository: pickflix
          - id: headless-combobox-docs
            checkout_repo: crvouga/headless-combobox
            checkout_path: projects/headless-combobox
            build_context: projects/headless-combobox
            dockerfile: projects/headless-combobox/Dockerfile
            ecr_repository: headless-combobox-docs
          - id: headless-combobox-svelte-example
            checkout_repo: crvouga/headless-combobox
            checkout_path: projects/headless-combobox
            build_context: projects/headless-combobox/example/svelte
            dockerfile: projects/headless-combobox/example/svelte/Dockerfile
            ecr_repository: headless-combobox-svelte-example
          - id: moviefinder-app-rust
            checkout_repo: crvouga/moviefinder.app-rust
            checkout_path: projects/moviefinder.app-rust
            build_context: projects/moviefinder.app-rust
            dockerfile: projects/moviefinder.app-rust/Dockerfile
            ecr_repository: moviefinder-app-rust
          - id: moviefinder-app-go
            checkout_repo: crvouga/moviefinder.app-go
            checkout_path: projects/moviefinder.app-go
            build_context: projects/moviefinder.app-go
            dockerfile: projects/moviefinder.app-go/Dockerfile
            ecr_repository: moviefinder-app-go
          - id: moviefinder-app-react
            checkout_repo: crvouga/moviefinder.app-react
            checkout_path: projects/moviefinder.app-react
            build_context: projects/moviefinder.app-react
            dockerfile: projects/moviefinder.app-react/Dockerfile
            ecr_repository: moviefinder-app-react
          - id: moviefinder-app-clojurescript
            checkout_repo: crvouga/moviefinder.app-clojurescript
            checkout_path: projects/moviefinder.app-clojurescript
            build_context: projects/moviefinder.app-clojurescript
            dockerfile: projects/moviefinder.app-clojurescript/Dockerfile
            ecr_repository: moviefinder-app-clojurescript
          - id: todo-app
            checkout_repo: crvouga/todo-v1
            checkout_path: projects/todo-v1
            build_context: projects/todo-v1
            dockerfile: projects/todo-v1/Dockerfile
            ecr_repository: todo-app
          - id: image-service
            checkout_repo: crvouga/image-service
            checkout_path: projects/image-service
            build_context: projects/image-service
            dockerfile: projects/image-service/Dockerfile
            ecr_repository: image-service
          - id: connect-four
            checkout_repo: crvouga/connect-four
            checkout_path: projects/connect-four
            build_context: projects/connect-four
            dockerfile: projects/connect-four/Dockerfile
            ecr_repository: connect-four
          - id: screenshot-service
            checkout_repo: crvouga/screenshot-service
            checkout_path: projects/screenshot-service
            build_context: projects/screenshot-service
            dockerfile: projects/screenshot-service/Dockerfile
            ecr_repository: screenshot-service
          - id: anime-blog
            checkout_repo: crvouga/anime
            checkout_path: projects/anime
            build_context: projects/anime
            dockerfile: projects/anime/Dockerfile
            ecr_repository: anime-blog
          - id: snake-game
            checkout_repo: crvouga/snake
            checkout_path: projects/snake
            build_context: projects/snake
            dockerfile: projects/snake/Dockerfile
            ecr_repository: snake-game
          - id: match-three
            checkout_repo: crvouga/match-three
            checkout_path: projects/match-three
            build_context: projects/match-three
            dockerfile: projects/match-three/Dockerfile
            ecr_repository: match-three
          - id: simon-says
            checkout_repo: crvouga/simon-says
            checkout_path: projects/simon-says
            build_context: projects/simon-says
            dockerfile: projects/simon-says/Dockerfile
            ecr_repository: simon-says
          - id: quiz-maker
            checkout_repo: crvouga/quiz-maker
            checkout_path: projects/quiz-maker
            build_context: projects/quiz-maker
            dockerfile: projects/quiz-maker/Dockerfile
            ecr_repository: quiz-maker
          - id: cheese
            checkout_repo: crvouga/cheese
            checkout_path: projects/cheese
            build_context: projects/cheese
            dockerfile: projects/cheese/Dockerfile
            ecr_repository: cheese
          - id: smart-dog-door
            checkout_repo: crvouga/smart-dog-door-python
            checkout_path: projects/smart-dog-door-python
            build_context: projects/smart-dog-door-python
            dockerfile: projects/smart-dog-door-python/Dockerfile
            ecr_repository: smart-dog-door

    steps:
      - name: Checkout portfolio (this repository)
        if: ${{ matrix.id == 'portfolio' }}
        uses: actions/checkout@v4

      - name: Checkout ${{ matrix.checkout_repo }}
        if: ${{ matrix.id != 'portfolio' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.checkout_repo }}
          path: ${{ matrix.checkout_path }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-${{ matrix.id }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ matrix.ecr_repository }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file "${{ matrix.dockerfile }}" \
            --tag "${REGISTRY}/${REPOSITORY}:latest" \
            --tag "${REGISTRY}/${REPOSITORY}:${{ github.sha }}" \
            --push \
            "${{ matrix.build_context }}"
